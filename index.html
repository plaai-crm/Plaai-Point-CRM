<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaai Point CRM</title>
<!-- SheetJS for Excel export (optional, needs internet). CSV export works offline. -->

<style>
  :root{
    --brand:#3d5675;         /* น้ำเงินหม่น พรีเมียม */
    --brand-dark:#2a3d54;
    --brand-light:#eaeef4;
    --gold:#c99a2e;
    --gold-light:#fbf3dd;
    --ink:#1b2733;
    --muted:#64748b;
    --line:#e2e8f0;
    --bg:#f4f6f8;
    --card:#ffffff;
    --danger:#d64545;
    --ok:#2f9e6f;
    --warn:#e0952b;
    --radius:14px;
    --shadow:0 1px 3px rgba(16,24,40,.06),0 6px 20px rgba(16,24,40,.05);
    font-family:'Segoe UI','Noto Sans Thai',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  h1,h2,h3,h4{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  .topbar{position:sticky;top:0;z-index:50;background:var(--brand);color:#fff;display:flex;align-items:center;
    gap:14px;padding:10px 18px;box-shadow:0 2px 10px rgba(42,61,84,.3)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.3px}
  .logo .mark{width:34px;height:34px;border-radius:10px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:900;font-size:19px}
  .who{font-size:12px;opacity:.85;font-weight:600;background:rgba(255,255,255,.12);padding:5px 12px;border-radius:999px}
  .topbar .spacer{flex:1}
  .lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;font-size:12px;font-weight:700}
  .lang-toggle button{background:transparent;color:#fff;border:0;padding:7px 12px}
  .lang-toggle button.active{background:#fff;color:var(--brand)}
  .btn-logout{background:rgba(255,255,255,.15);color:#fff;border:0;padding:7px 12px;border-radius:8px;font-weight:600;font-size:12px}

  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 70px}

  .grid{display:grid;gap:16px}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3,.cols-2{grid-template-columns:1fr}}
  @media(max-width:560px){.cols-4{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:18px}
  .card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .card-h h3{font-size:15px}
  .card-b{padding:16px 18px}

  .kpi{padding:18px}
  .kpi .label{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--ok);margin-top:4px;font-weight:600}
  .kpi .ic{float:right;width:42px;height:42px;border-radius:12px;background:var(--brand-light);color:var(--brand);display:grid;place-items:center;font-size:20px}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px;gap:12px;flex-wrap:wrap}
  .section-title h2{font-size:19px}
  .muted{color:var(--muted)}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
  .pill.green{background:var(--brand-light);color:var(--brand-dark)}
  .pill.gold{background:var(--gold-light);color:var(--gold)}
  .pill.gray{background:#eef1f4;color:var(--muted)}
  .pill.red{background:#fbe6e6;color:var(--danger)}
  .pill.blue{background:#e6effb;color:#2b6cb0}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;background:#fbfcfd}
  tbody tr:hover{background:#fafcfb}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}

  .btn{border:0;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px}
  .btn.primary{background:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-dark)}
  .btn.gold{background:var(--gold);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--brand);color:var(--brand)}
  .btn.sm{padding:6px 12px;font-size:12px}
  .btn.danger{background:#fff;border:1px solid #f0c9c9;color:var(--danger)}
  .btn.block{width:100%;text-align:center}

  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:#fff}
  input:focus,select:focus,textarea:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light)}
  label.fld{display:block;margin-bottom:12px}
  label.fld .lb{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1;min-width:120px}

  .side-nav{display:flex;flex-direction:column;gap:4px}
  .side-nav button{display:flex;align-items:center;gap:10px;background:transparent;border:0;padding:11px 14px;border-radius:10px;text-align:left;font-size:13.5px;font-weight:600;color:var(--muted);width:100%}

  .side-nav button:hover:not(.active){background:#f1f5f4}
  .side-nav .ic{width:20px;text-align:center}

  .device{max-width:390px;margin:0 auto;background:#f7f9fc;border-radius:24px;border:1px solid #dfe5ec;box-shadow:0 12px 38px rgba(28,43,60,.13);overflow:hidden}
  .device .status{height:14px;background:var(--brand-dark)}
  .device .card{border-color:#e1e7ee;box-shadow:0 3px 12px rgba(36,52,69,.045);border-radius:14px}

  .device .hint{background:var(--brand-light);border-color:#d4deea;color:var(--brand-dark)}
  .device .btn{border-radius:9px}
  .device .tabbar{gap:0;margin-bottom:14px;border-bottom-color:#dce3eb;justify-content:space-between;flex-wrap:nowrap}

  .portal-referral{background:#fbf6e8!important;border-color:#eadcaf!important}
  .portal-share-title{color:var(--brand-dark);letter-spacing:.1px}

  .share-actions .btn{padding:7px 8px;text-align:center;white-space:nowrap}
  .customer-topbar .logo{white-space:nowrap;flex-shrink:0}

  .mcard::after{content:"";position:absolute;right:-34px;top:-38px;width:126px;height:126px;background:rgba(255,255,255,.075);border-radius:50%}

  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.5);display:grid;place-items:center;z-index:100;padding:16px}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:92vh;overflow:auto}
  .modal .m-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
  .modal .m-b{padding:18px}
  .modal .m-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .x{background:transparent;border:0;font-size:20px;color:var(--muted);line-height:1}

  .stars{display:flex;gap:8px;font-size:30px;color:#d7dee5}
  .stars .s{cursor:pointer;transition:transform .1s}
  .stars .s.on{color:var(--gold)}
  .stars .s:hover{transform:scale(1.15)}
  .bar{height:8px;border-radius:6px;background:#eef1f4;overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--brand);border-radius:6px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:13.5px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .25s,transform .25s;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  .prop-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;background:#eef1f4}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .hint{background:var(--gold-light);border:1px solid #eeddb0;color:#8a6a1f;border-radius:10px;padding:10px 12px;font-size:12.5px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .tabbar{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .tabbar button{background:transparent;border:0;padding:10px 4px;margin-right:14px;font-weight:700;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent}
  .tabbar button.active{color:var(--brand);border-bottom-color:var(--brand)}
  code.mono{background:#eef1f4;padding:2px 8px;border-radius:6px;font-weight:700;letter-spacing:1px}

  /* login */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(160deg,#eef2f7,#e2e8f1)}
  .login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(16,24,40,.15);max-width:960px;width:100%;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
  @media(max-width:760px){.login-card{grid-template-columns:1fr}}
  .login-hero{background:linear-gradient(150deg,var(--brand),var(--brand-dark));color:#fff;padding:40px 34px;display:flex;flex-direction:column;justify-content:center}
  .login-hero .mark{width:56px;height:56px;border-radius:16px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:900;font-size:30px;margin-bottom:18px}
  .login-body{padding:34px}
  .acct{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;font-weight:600}
  .acct:hover{border-color:var(--brand);background:var(--brand-light)}
  .acct .av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
  .acct small{color:var(--muted);font-weight:500;font-size:11.5px}
  .thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;background:#eef1f4;border:1px solid var(--line)}
  .rwimg{display:flex;gap:6px}
  .rwimg img{width:40px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--line)}
</style>
</head>
<body>

<div id="root"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   Plaai Point CRM — Prototype v2
   - Login + role-based access (per-property staff + HQ admin)
   - Customer portal (phone login)
   - Points expiry, SMS promo, rewards w/ images, Excel/CSV export
   - Data layer with Supabase adapter scaffold (demo fallback)
   ========================================================= */

/* ====================== DATA LAYER ======================
   By default runs in in-memory DEMO mode.
   To go live with Supabase, fill SUPABASE_CONFIG and set enabled:true.
   Then every write also mirrors to Supabase (real-time ready).
   Full SQL schema is in the companion file: supabase-schema.sql
========================================================= */
const SUPABASE_CONFIG = { enabled:false, url:"", anonKey:"" };
const DB = {
  online:false, client:null,
  async init(){
    if(!SUPABASE_CONFIG.enabled || !window.supabase) return;
    try{
      this.client = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      this.online = true;
      // Example real-time subscription (uncomment when tables exist):
      // this.client.channel('tx').on('postgres_changes',{event:'*',schema:'public',table:'transactions'},()=>render()).subscribe();
    }catch(e){ console.warn('Supabase init failed, staying in demo mode', e); }
  },
  // save(table,row) mirrors a write to Supabase when online; always keeps local state.
  async save(table,row){
    if(this.online){ try{ await this.client.from(table).upsert(row); }catch(e){ console.warn('save fail',e);} }
    return row;
  },
  /* ---- Customer lookups (live mode) — go through the member RPC only.
     The member card now uses the full registered name. Production should add
     OTP verification before returning personal data. ---- */
  async memberByPhone(phone){
    if(!this.online) return null;
    try{
      const {data,error}=await this.client.rpc('get_member_by_phone',{p_phone:phone});
      if(error||!data||!data.length) return null;
      const r=data[0];
      return {id:r.id, phone:r.phone, name:r.name, tier:r.tier, points:r.points, home:r.home, refCode:r.ref_code, photo:r.photo||""};
    }catch(e){ console.warn('memberByPhone fail',e); return null; }
  },
  async memberTx(phone){
    if(!this.online) return [];
    try{
      const {data,error}=await this.client.rpc('get_member_transactions',{p_phone:phone});
      if(error||!data) return [];
      return data.map(r=>({id:r.id, memberId:r.member_id, date:r.date, type:r.type, branch:r.branch, pts:r.pts, exp:r.exp||"", note:{th:r.note_th||"",en:r.note_en||""}}));
    }catch(e){ console.warn('memberTx fail',e); return []; }
  }
};

  const p=Math.max(0,Number(points)||0);

}

}

/* ----- Upsert: เพิ่มสมาชิกใหม่ หรืออัปเดตของเดิมด้วยเบอร์โทร (กันข้อมูลซ้ำ) ใช้ร่วมกันทั้ง ERP/อีเมล/นำเข้าด้วยมือ/พนักงานอัปเดตวันนี้ -----
   rows: array ของ {phone,name,tier,home,spend,points}  (ค่าไหนไม่มีจะข้ามไม่แตะของเดิม) */
function upsertMembers(rows, defaultHome, source, pid){
  let added=0, updated=0, skipped=0;
  rows.forEach(r=>{
    const phone=(r.phone||'').trim();
    if(!phone||!/\d/.test(phone)){ skipped++; return; }
    const existing=findMemberByPhone(phone);
    if(existing){
      // สมาชิกเดิม (จับคู่ด้วยเบอร์โทรที่ normalize แล้ว) → อัปเดตแทนการสร้างซ้ำ
      if(r.name)existing.name=r.name;
      if(r.tier&&TIER_KEYS.includes(r.tier.toLowerCase())){ existing.tierMode='manual'; existing.manualTier=r.tier.toLowerCase(); }
      if(typeof r.addSpend==='number')existing.spend+=r.addSpend;
      if(typeof r.addPoints==='number')existing.points+=r.addPoints;
      syncMemberTier(existing);
      DB.save('members',existing); updated++;
    } else {
      const validTiers=['silver','gold','platinum'];
      const tier=validTiers.includes((r.tier||'').toLowerCase())?r.tier.toLowerCase():'silver';
      const home=PROPERTIES.some(p=>p.id===r.home)?r.home:defaultHome;
      const hasManualTier=TIER_KEYS.includes((r.tier||'').toLowerCase());
      const m={id:NEXT_MEMBER_ID++, phone, name:r.name||(LANG==='th'?'สมาชิกใหม่':'New member'), tier, tierMode:hasManualTier?'manual':'auto', manualTier:hasManualTier?tier:'', points:r.addPoints||0, spend:r.addSpend||0, joined:today(), home, refCode:"PLAAI-"+Math.floor(1000+Math.random()*9000), photo:""};
      syncMemberTier(m);
      MEMBERS.push(m); DB.save('members',m); added++;
    }
  });
  if(pid){
    const s=sourceOf(pid); if(s)s.lastSync=nowStamp();
    const pr=PROPERTIES.find(x=>x.id===pid)||{name:{th:pid,en:pid}};
    const by=source==='manual' ? {th:'พนักงาน '+pr.name.th, en:'Staff — '+pr.name.en} : {th:'ระบบ (ทดสอบดึงข้อมูล)', en:'System (test sync)'};
    IMPORT_LOG.unshift({id:NEXT_IMPORTLOG_ID++, ts:nowStamp(), propertyId:pid, source, by, added, updated, skipped, status:'ok'});
  }
  return {added, updated, skipped};
}
/* แปลงข้อความ CSV (เบอร์,ชื่อ,ระดับ,ยอดใช้จ่ายเพิ่ม,แต้มเพิ่ม) เป็น rows สำหรับ upsertMembers */
function parseSyncCsv(raw){
  return raw.split(/\r?\n/).map(line=>line.trim()).filter(Boolean)
    .filter(line=>{ const c=splitCsvLine(line); return c[0]&&/\d/.test(c[0])&&!/phone|เบอร์/i.test(c[0]); })
    .map(line=>{ const c=splitCsvLine(line); return {phone:c[0], name:c[1]||'', tier:c[2]||'', addSpend:parseInt(c[3])||0, addPoints:parseInt(c[4])||0}; });
}

async function cardLogin(){
  const v=$("#cardPhone").value.trim();
  const ref=($("#cardRef")&&$("#cardRef").value||'').trim();
  let m;
  if(DB.online){
    m=await DB.memberByPhone(v);               // member RPC: full registered name, no spend
    if(m){ const tx=await DB.memberTx(v); TX=TX.filter(x=>x.memberId!==m.id).concat(tx); }
  }else{
    m=findMemberByPhone(v);
  }
  if(!m){ toast(ct('notfound')); return; }
  const referral=registerReferral(ref,m,CARD_BRANCH||m.home,'customer');
  if(!referral.ok){ toast(ct(referral.reason)); return; }
  CUSTOMER=m; localStorage.setItem('plaai_phone',v); render();

function findMemberByReferral(value){
  const raw=(value||'').trim(); if(!raw)return null;
  const code=raw.toUpperCase();
  return MEMBERS.find(m=>(m.refCode||'').toUpperCase()===code)||findMemberByPhone(raw);

function registerReferral(value,friend,branch,source){
  const raw=(value||'').trim(); if(!raw)return {ok:true,created:false};
  const referrer=findMemberByReferral(raw);
  if(!referrer)return {ok:false,reason:'refInvalid'};
  const friendPhone=(friend&&friend.phone)||'';
  if((friend&&friend.id===referrer.id)||(friendPhone&&digits(friendPhone)===digits(referrer.phone)))return {ok:false,reason:'refSelf'};
  const used=REFERRALS.some(r=>digits(r.friendPhone)===digits(friendPhone));
  if(used)return {ok:false,reason:'refUsed'};
  const row={id:NEXT_REF_ID++,referrerId:referrer.id,friendId:(friend&&friend.id)||0,friendPhone,friendName:(friend&&friend.name)||'Guest',branch:branch||referrer.home,status:'pending',date:today(),bonus:CONFIG.referrerBonus,source:source||'staff',refCode:referrer.refCode};
  REFERRALS.push(row); DB.save('referrals',row);
  return {ok:true,created:true,referrer,row};
}

/* ---- Image upload compression (protects the company's cloud storage) ----
   Any image a user uploads is downscaled + re-encoded to JPEG BEFORE it is
   stored/sent to the cloud. A phone photo is often 3–8 MB; after this it is
   usually ~100–250 KB. Change the numbers below to make images smaller
   (saves more space) or sharper (uses more space).
     reward  = product/reward pictures  → max 1280 px on the long edge
     photo   = member profile pictures  → max 512 px
   Both are capped at ~250 KB per image; quality steps down automatically. */
const IMG_LIMITS = { reward:{ maxDim:1280, quality:0.8, maxKB:250 }, photo:{ maxDim:512, quality:0.82, maxKB:120 } };
function compressImageFile(file, kind){
  const lim = IMG_LIMITS[kind] || IMG_LIMITS.reward;
  return new Promise((resolve,reject)=>{
    if(!file || !/^image\//.test(file.type)){ reject(new Error('not-image')); return; }
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      let w=img.naturalWidth, h=img.naturalHeight;
      const scale = Math.min(1, lim.maxDim/Math.max(w,h));
      w = Math.max(1,Math.round(w*scale)); h = Math.max(1,Math.round(h*scale));
      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      let q = lim.quality, out = cv.toDataURL('image/jpeg', q);
      // base64 chars ≈ bytes × 1.37 — step quality down until under the cap
      const cap = lim.maxKB*1024*1.37;
      while(out.length > cap && q > 0.4){ q -= 0.1; out = cv.toDataURL('image/jpeg', q); }
      resolve(out);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('load-fail')); };
    img.src = url;
  });
}

async function doLogin(){
  const th=LANG==='th';
  const u=($("#lg_user").value||'').trim().toLowerCase();
  const p=$("#lg_pass").value||'';
  if(DB.online){
    /* LIVE MODE — real sign-in via Supabase Auth (passwords stored hashed in Supabase,
       never in this file). Usernames map to emails like hq@plaai.local (manual §4.1). */
    try{
      const email=u.includes('@')?u:(u+'@plaai.local');
      const {data,error}=await DB.client.auth.signInWithPassword({email,password:p});
      if(error||!data||!data.user){ toast(th?'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง':'Incorrect username or password'); return; }
      const {data:prof,error:pErr}=await DB.client.from('staff_profiles').select('username,role,property_id,full_name').eq('id',data.user.id).single();
      if(pErr||!prof){ await DB.client.auth.signOut(); toast(th?'บัญชีนี้ยังไม่ได้ผูกโปรไฟล์พนักงาน — ดูคู่มือข้อ 4.2':'This account has no staff profile yet — see manual §4.2'); return; }
      const local=ACCOUNTS.find(x=>x.user===prof.username);
      SESSION={role:prof.role, property:prof.property_id||undefined, name:(local?local.name:{th:prof.full_name||prof.username,en:prof.full_name||prof.username})};
    }catch(e){ console.warn('login fail',e); toast(th?'เชื่อมต่อระบบล็อกอินไม่ได้ กรุณาลองใหม่':'Could not reach the login service, please retry'); return; }
  }else{
    /* DEMO MODE only — checks the sample passwords in this file */
    const a=ACCOUNTS.find(x=>x.user.toLowerCase()===u);
    if(!a||a.pass!==p){ toast(th?'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง':'Incorrect username or password'); return; }
    SESSION={role:a.role, property:a.property, name:a.name};
  }
  if(SESSION.role==="staff")STAFF_VIEW="desk"; else ADMIN_VIEW="dashboard";
  render();
}
function loginAs(user){ // internal shortcut (no UI) — real sign-in uses doLogin()
  const a=ACCOUNTS.find(x=>x.user===user); if(!a)return;
  SESSION={role:a.role, property:a.property, name:a.name};
  if(a.role==="staff")STAFF_VIEW="desk"; else ADMIN_VIEW="dashboard";
  render();
}
async function customerLogin(){
  const phone=$("#custPhone").value.trim();
  const ref=($("#custRef")&&$("#custRef").value||'').trim();
  let m;
  if(DB.online){
    m=await DB.memberByPhone(phone);           // member RPC: full registered name, no spend
    if(m){ const tx=await DB.memberTx(phone); TX=TX.filter(x=>x.memberId!==m.id).concat(tx); }
  }else{
    m=findMemberByPhone(phone);
  }
  if(!m){ toast(LANG==='th'?'ไม่พบเบอร์นี้ในระบบ':'Phone not found'); return; }
  const referral=registerReferral(ref,m,m.home,'customer');
  if(!referral.ok){ const msg={refInvalid:{th:'ไม่พบรหัสนี้ กรุณาตรวจสอบอีกครั้ง',en:'Referral code not found'},refSelf:{th:'ไม่สามารถใช้รหัสของตัวเองได้',en:'You cannot use your own code'},refUsed:{th:'เบอร์นี้เคยใช้รหัสแนะนำแล้ว',en:'This phone already used a referral code'}}[referral.reason]; toast((msg&&msg[LANG])||'Invalid referral code'); return; }
  CUSTOMER=m; localStorage.setItem('plaai_phone',phone); render();
  if(referral.created)toast(LANG==='th'?'บันทึกรหัสแนะนำแล้ว ✓':'Referral saved ✓');
}

function saveTierSettings(){
  const th=LANG==='th';
  const gold=Math.max(1,parseInt($("#tier_pts_gold").value)||0);

  TIER_KEYS.forEach(k=>{

let PROMO_F={tier:"all",branch:"all",lang:"all"};
function promoRecipients(){
  const stayedAt=mid=>new Set(TX.filter(x=>x.memberId===mid&&x.type==='stay').map(x=>x.branch));
  return MEMBERS.filter(m=>{
    if(PROMO_F.tier!=="all"&&tierRank[m.tier]<tierRank[PROMO_F.tier])return false;
    if(PROMO_F.lang==="th"&&!m.phone.startsWith("+66"))return false;
    if(PROMO_F.lang==="cn"&&!m.phone.startsWith("+86"))return false;
    if(PROMO_F.branch!=="all"){ const s=stayedAt(m.id); s.add(m.home); if(!s.has(PROMO_F.branch))return false; }
    return true;
  });
}

function sendPromo(){
  const msg=$("#promoMsg").value.trim(); const rec=promoRecipients();

  ================================================================================ */
  PROMOS.push({id:NEXT_PROMO_ID++,date:today(),msg,count:rec.length,filters:segParts.join(" · ")});

function cardLinkOrigin(){ return location.origin+location.pathname; }
function buildCardLink(branch,lang,refCode){

  if(branch) p.set('branch',branch);
  if(lang&&lang!=='th') p.set('lang',lang);
  if(refCode)p.set('ref',refCode);
  return cardLinkOrigin()+'?'+p.toString();
}

function syFile(e){
  const th=LANG==='th'; const f=e.target.files&&e.target.files[0]; if(!f)return;
  const name=(f.name||'').toLowerCase();
  if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    if(typeof XLSX==="undefined"){ toast(th?'อ่าน Excel ต้องต่อเน็ต — บันทึกเป็น .csv แล้วลองใหม่':'Excel needs internet — save as .csv and retry'); return; }
    const r=new FileReader();
    r.onload=()=>{ try{ const wb=XLSX.read(new Uint8Array(r.result),{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; $("#sy_text").value=XLSX.utils.sheet_to_csv(ws); toast(th?'อ่านไฟล์ Excel แล้ว':'Excel loaded'); }catch(err){ toast(th?'อ่านไฟล์ Excel ไม่สำเร็จ':'Could not read Excel'); } };
    r.readAsArrayBuffer(f);
  } else { const r=new FileReader(); r.onload=()=>{ $("#sy_text").value=r.result; }; r.readAsText(f); }
}

function downloadSyncTemplate(){
  const headers=["phone","name","tier(optional)","spend_add_thb","points_add","stay_or_purchase_date"];
  const sampleRows=[["+66 89 111 2233","คุณแอน","gold","3200","32","2026-07-11"],["+66 62 555 7788","Mr. John","silver","1500","15","2026-07-11"]];
  const esc=v=>{v=String(v??'');return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv="﻿"+[headers.join(","),...sampleRows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="plaai_daily_report_template.csv"; a.click();

function setAdjMode(mode){ window._adjMode=mode; $("#adjAdd").className="btn "+(mode==='add'?'primary':'ghost'); $("#adjDed").className="btn "+(mode==='deduct'?'primary':'ghost'); }
function applyAdjust(id){
  const th=LANG==='th'; const m=memberById(id);
  let amt=parseInt($("#adj_amt").value)||0;
  const reason=$("#adj_reason").value.trim();
  if(!amt){ toast(th?'ระบุจำนวนแต้ม':'Enter an amount'); return; }
  if(!reason){ toast(th?'⚠ ต้องระบุเหตุผลก่อนปรับแต้ม':'⚠ A reason is required'); return; }
  amt=window._adjMode==='deduct'?-Math.abs(amt):Math.abs(amt);
  const high = amt>0 && amt>=CONFIG.approvalThreshold;
  window._pendingAdj={id,amt,reason,high};
  const newBal=Math.max(0,m.points+amt);
  modal(`<div class="m-h"><h3>${th?'ยืนยันการปรับแต้ม':'Confirm adjustment'}</h3><button class="x" onclick="closeModal()">✕</button></div>

        : `<div class="hint">${th?'รายการนี้จะถูกบันทึกในประวัติสมาชิกและ Audit Log':'This action is recorded in member history and the audit log.'}</div>`}

  const th=LANG==='th'; const p=window._pendingAdj; if(!p)return; const m=memberById(p.id);

}

function impFile(e){
  const th=LANG==='th';
  const f=e.target.files&&e.target.files[0]; if(!f)return;
  const name=(f.name||'').toLowerCase();
  if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    if(typeof XLSX==="undefined"){ toast(th?'อ่าน Excel ต้องต่อเน็ต — บันทึกเป็น .csv แล้วลองใหม่':'Excel needs internet — save as .csv and retry'); return; }
    const r=new FileReader();
    r.onload=()=>{ try{ const wb=XLSX.read(new Uint8Array(r.result),{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; $("#imp_text").value=XLSX.utils.sheet_to_csv(ws); toast(th?'อ่านไฟล์ Excel แล้ว — กด “นำเข้า”':'Excel loaded — click “Import”'); }catch(err){ toast(th?'อ่านไฟล์ Excel ไม่สำเร็จ':'Could not read Excel'); } };
    r.readAsArrayBuffer(f);
  } else {
    const r=new FileReader(); r.onload=()=>{ $("#imp_text").value=r.result; }; r.readAsText(f);
  }
}
function splitCsvLine(line){ const out=[]; let cur='', q=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(q){ if(ch==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=ch; } else { if(ch==='"')q=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; } } out.push(cur); return out.map(s=>s.trim()); }
function importMembers(){
  const th=LANG==='th';
  const raw=($("#imp_text").value||'').trim(); if(!raw){ toast(th?'ยังไม่มีข้อมูล':'No data'); return; }
  const validTiers=['silver','gold','platinum']; const propIds=PROPERTIES.map(p=>p.id);
  let added=0, skipped=0;
  raw.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const c=splitCsvLine(line);
    const phone=c[0]||''; if(!phone||!/\d/.test(phone)||/phone|เบอร์/i.test(phone)){ skipped++; return; } // skip header/blank
    if(findMemberByPhone(phone)){ skipped++; return; } // no duplicates
    const name=c[1]||(th?'สมาชิกใหม่':'New member');
    const hasManualTier=validTiers.includes((c[2]||'').toLowerCase());
    const tier=hasManualTier?c[2].toLowerCase():'silver';
    const home=propIds.includes(c[3])?c[3]:PROPERTIES[0].id;
    MEMBERS.push({id:NEXT_MEMBER_ID++,phone,name,tier,tierMode:hasManualTier?'manual':'auto',manualTier:hasManualTier?tier:'',points:0,spend:0,joined:today(),home,refCode:"PLAAI-"+Math.floor(1000+Math.random()*9000),photo:""});
    added++;
  });
  toast(th?`นำเข้า ${added} รายชื่อ ✓ (ข้าม ${skipped})`:`Imported ${added} ✓ (skipped ${skipped})`);
  closeModal(); MEMBER_PAGE=1; rerenderAdmin();
}

/* ----- Member profile photo (pulled from customer channel) ----- */
function setPhotoChannel(id,pf){ const m=memberById(id); if(!m)return; m.photo=channelAvatar(pf); m.photoSrc=pf; DB.save('members',m); toast(LANG==='th'?`ดึงรูปจาก ${PLATFORM_META[pf].name} แล้ว ✓`:`Pulled from ${PLATFORM_META[pf].name} ✓`); rerenderApp(); openMember(id); }
function setPhotoUrl(id){ const u=($("#mp_url").value||'').trim(); if(!u){ toast(LANG==='th'?'วางลิงก์รูปก่อน':'Paste an image URL'); return; } const m=memberById(id); m.photo=u; m.photoSrc='url'; DB.save('members',m); toast(LANG==='th'?'บันทึกรูปแล้ว ✓':'Photo saved ✓'); rerenderApp(); openMember(id); }
async function mpUploadPhoto(id,e){ const f=e.target.files[0]; e.target.value=''; if(!f)return; const m=memberById(id); if(!m)return; try{ m.photo=await compressImageFile(f,'photo'); m.photoSrc='upload'; DB.save('members',m); toast(LANG==='th'?'อัปโหลดและย่อรูปแล้ว ✓':'Uploaded & compressed ✓'); rerenderApp(); openMember(id); }catch(err){ toast(imgErrMsg()); } }
function clearPhoto(id){ const m=memberById(id); if(!m)return; m.photo=''; m.photoSrc=''; DB.save('members',m); toast(LANG==='th'?'ลบรูปแล้ว':'Photo removed'); rerenderApp(); openMember(id); }

let RW_UPLOADS=[];   // compressed data-URLs the admin uploaded in the reward editor
function openReward(id){
  const r=id?REWARDS.find(x=>x.id===id):{name:{th:"",en:""},cost:100,cat:"cash",imgs:[]};
  RW_UPLOADS=[];
  const th=LANG==='th';
  const imgInputs=[0,1,2].map(i=>`<input id="rw_img${i}" placeholder="${t('txt.imgUrl')} ${i+1}" value="${(r.imgs&&r.imgs[i])?r.imgs[i]:''}" style="margin-bottom:6px">`).join("");
  modal(`<div class="m-h"><h3>${id?t('common.edit'):t('txt.addReward')}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="m-b">
      <label class="fld"><span class="lb">${t('common.name')}</span><input id="rw_name" value="${r.name[LANG]||''}"></label>
      <div class="row"><label class="fld"><span class="lb">${t('common.points')}</span><input id="rw_cost" type="number" value="${r.cost}"></label><label class="fld"><span class="lb">${th?'ประเภท':'Category'}</span><select id="rw_cat"><option value="cash" ${r.cat==='cash'?'selected':''}>${th?'ส่วนลด/เงินสด':'Cash'}</option><option value="partner" ${r.cat==='partner'?'selected':''}>Plaai Partner</option></select></label></div>
      <label class="fld"><span class="lb">${t('txt.images')}</span>
        <div style="border:1px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:8px">
          <input type="file" accept="image/*" multiple id="rw_file" onchange="rwUploadImgs(event)">
          <div class="muted" style="font-size:11px;margin-top:6px">📷 ${th?'อัปโหลดรูปจากเครื่อง — ระบบย่อรูปอัตโนมัติ (สูงสุด 1280px · ~250KB/รูป) เพื่อประหยัดพื้นที่คลาวด์':'Upload from your device — images are auto-compressed (max 1280px · ~250KB each) to save cloud space'}</div>
          <div id="rw_prev" class="rwimg" style="margin-top:8px"></div>
        </div>
        ${imgInputs}<div class="muted" style="font-size:11px">${th?'หรือวางลิงก์รูป (URL) ก็ได้ สูงสุด 3 รูปรวมกัน':'…or paste image URLs instead. Max 3 images total.'}</div></label>
    </div>
    <div class="m-f"><button class="btn primary" onclick="saveReward(${id||0})">${t('common.save')}</button><button class="btn ghost" onclick="closeModal()">${t('common.cancel')}</button></div>`);
}
async function rwUploadImgs(e){
  const files=[...e.target.files];
  for(const f of files){
    if(RW_UPLOADS.length>=3) break;
    try{ RW_UPLOADS.push(await compressImageFile(f,'reward')); }
    catch(err){ toast(imgErrMsg()); }
  }
  e.target.value='';
  const prev=$("#rw_prev");
  if(prev) prev.innerHTML=RW_UPLOADS.map((d,i)=>`<span style="position:relative;display:inline-block"><img src="${d}"><button onclick="rwRemoveImg(${i})" title="remove" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border:0;border-radius:50%;background:var(--danger);color:#fff;font-size:11px;line-height:1;cursor:pointer">✕</button></span>`).join("");
  toast(LANG==='th'?`ย่อรูปแล้ว ${RW_UPLOADS.length} รูป ✓`:`Compressed ${RW_UPLOADS.length} image(s) ✓`);
}
function rwRemoveImg(i){ RW_UPLOADS.splice(i,1); const prev=$("#rw_prev"); if(prev) prev.innerHTML=RW_UPLOADS.map((d,j)=>`<span style="position:relative;display:inline-block"><img src="${d}"><button onclick="rwRemoveImg(${j})" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border:0;border-radius:50%;background:var(--danger);color:#fff;font-size:11px;line-height:1;cursor:pointer">✕</button></span>`).join(""); }
function saveReward(id){
  const name=$("#rw_name").value.trim(); if(!name){toast(LANG==='th'?'ใส่ชื่อรางวัล':'Enter name');return;}
  const cost=parseInt($("#rw_cost").value)||100, cat=$("#rw_cat").value;
  const urls=[0,1,2].map(i=>$("#rw_img"+i).value.trim()).filter(Boolean);
  const imgs=[...RW_UPLOADS, ...urls].slice(0,3);   // uploaded (compressed) first, then any URLs
  if(id){ const r=REWARDS.find(x=>x.id===id); r.name={th:name,en:name}; r.cost=cost; r.cat=cat; r.imgs=imgs.length?imgs:r.imgs; DB.save('rewards',r); }
  else { REWARDS.push({id:NEXT_REWARD_ID++,name:{th:name,en:name},cost,cat,active:true,imgs:imgs.length?imgs:[ph("🎁","#3d5675")]}); }
  RW_UPLOADS=[];
  toast(LANG==='th'?'บันทึกของรางวัลแล้ว ✓':'Reward saved ✓'); closeModal(); rerenderAdmin();
}

/* ====================== bindings ======================= */
function rerenderAdmin(){ if(SESSION&&SESSION.role==="admin"){ const el=document.querySelector('.admin-layout'); if(el)el.parentElement.innerHTML=viewAdmin(); bindDynamic(); } }
function rerenderStaff(){ if(SESSION&&SESSION.role==="staff"){ const el=document.querySelector('.admin-layout'); if(el)el.parentElement.innerHTML=viewStaffApp(); bindDynamic(); } }
function bindDynamic(){
  document.querySelectorAll('[data-av]').forEach(b=>b.onclick=()=>{ADMIN_VIEW=b.dataset.av;render();});
  document.querySelectorAll('[data-sv]').forEach(b=>b.onclick=()=>{STAFF_VIEW=b.dataset.sv;render();});
}
function bindChrome(){
  const lt=$("#langToggle"); if(lt)lt.querySelectorAll("button").forEach(b=>b.onclick=()=>{ LANG=b.dataset.lang; document.documentElement.lang=LANG; render(); });
}

/* ====================== boot ======================= */
DB.init();
if(CARD_MODE){
  applyCardTheme();
  document.documentElement.lang=CARD_LANG;
  // ถ้าเคยกรอกเบอร์ไว้ เปิดบัตรให้อัตโนมัติ (ลูกค้าไม่ต้องกรอกซ้ำ)
  const saved=localStorage.getItem('plaai_phone');
  // ถ้าเปิดลิงก์ที่มีรหัสแนะนำ ให้แสดงช่องยืนยันก่อน แม้เครื่องจะจำเบอร์เดิมไว้
  if(saved&&!CARD_PARAMS.get('ref')){ const m=findMemberByPhone(saved); if(m)CUSTOMER=m; }
}
render();
</script>
